<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knot Mosaic Table</title>
  <style>
    body { font-family: monospace; padding: 1em; font-size: clamp(14px, 1.2vw, 20px); }

    table { border-collapse: collapse; }
    th, td { border: 1px solid #999; padding: 0.4em 0.8em; text-align: center; }
    th { background: #eee; }
    td.knot-id { text-align: left; font-weight: bold; }

    /* Clickable numbers */
    span.cell-value {
      cursor: pointer;
      color: #0055cc;
      text-decoration: underline;
    }
    span.cell-value:hover { color: #cc3300; }

    /* Overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #overlay.active { display: flex; }
    #overlay-box {
      background: #fff;
      padding: 1em;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      text-align: center;
      position: relative;
    }
    #overlay-box img { max-width: 80vw; max-height: 75vh; display: block; margin: 0.5em auto; }
    #overlay-close {
      position: absolute;
      top: 0.3em; right: 0.5em;
      font-size: 1.4em;
      cursor: pointer;
      background: none;
      border: none;
    }
    #overlay-caption { margin-top: 0.4em; font-size: 0.9em; color: #333; }
  </style>
</head>
<body>

<h2>Knot Mosaic Table</h2>
<p>Click a number to view the corresponding mosaic image.</p>

<table>
  <thead>
    <tr>
      <th>knot</th>
      <th>1</th>
      <th>2</th>
      <th>3</th>
      <th>4</th>
      <th>5</th>
      <th>6</th>
    </tr>
  </thead>
  <tbody>
{{TABLE_BODY}}
  </tbody>
</table>

<!-- Image overlay -->
<div id="overlay" onclick="hideOverlay(event)">
  <div id="overlay-box">
    <button id="overlay-close" onclick="hideOverlay(null)" title="Close">&times;</button>
    <img id="overlay-img" src="" alt="Mosaic image">
    <div id="overlay-caption"></div>
  </div>
</div>

<script>
  function showOverlay(imgSrc, value, colN) {
    document.getElementById('overlay-img').src = imgSrc;
    document.getElementById('overlay-caption').textContent =
      'N = ' + colN + '  \u2022  mosaic sides: ' + value;
    document.getElementById('overlay').classList.add('active');
  }

  function hideOverlay(event) {
    // Close if clicking the dark backdrop or the × button
    if (event === null || event.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('overlay-img').src = '';
    }
  }

  // Also close with Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideOverlay(null);
  });
</script>

</body>
</html>
